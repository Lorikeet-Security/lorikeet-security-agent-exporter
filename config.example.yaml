# Lorikeet Security Agent Exporter - example configuration
# Copy to config.yaml and fill in real values.
# Secrets should be supplied via environment variables, not committed.

# REQUIRED: CIDR ranges / hostnames the agent is authorized to touch.
# The scope enforcer is a hard gate; no collector contacts hosts outside this list.
scope:
  - 10.0.0.0/16
  - 192.168.50.0/24
  # - 10.10.1.5   # single hosts are allowed too

# Platform ingest endpoint. Omit to run standalone (findings logged locally only).
platform_url: https://lorikeetsecurity.com/ingest

# License key - required only for platform ingest. Supply via env: LK_LICENSE_KEY
license_key: ${LK_LICENSE_KEY}

# Agent token - authenticates this agent to the platform. Supply via env: LK_AGENT_TOKEN
agent_token: ${LK_AGENT_TOKEN}

# Collection cadence: "continuous" for back-to-back cycles, or a duration like 6h, 24h, 30m.
interval: 6h

# Enabled collector modules. Comment out any you do not need.
# Supply chain analysis (npm crawl + OSV vuln lookup + malicious package detection)
# runs automatically as part of discovery — no separate entry needed.
modules:
  - discovery
  - patch
  - inventory
  - posture

# Max parallel host operations per cycle. Tune for network sensitivity.
concurrency: 16

# Log level: debug | info | warn | error
log_level: info

# Agent ID - auto-generated on first run and persisted to .lk_state/agent.json.
# You can pin it here to keep a stable identity across reinstalls.
# agent_id: "your-uuid-here"

# ---------------------------------------------------------------------------
# Multi-agent coordination
# ---------------------------------------------------------------------------
# Run a coordinator HTTP server so peer agents on other segments can pull
# this agent's findings. Supply a peer_secret for shared-secret auth.
# coordinator_port: 8765
# peer_secret: ${LK_PEER_SECRET}

# Peer agents to pull discovered hosts and findings from each cycle.
# peers:
#   - http://10.1.0.5:8765    # DMZ agent
#   - http://10.2.0.9:8765    # OT segment agent

# ---------------------------------------------------------------------------
# Auto-close loop
# ---------------------------------------------------------------------------
# When a finding is absent for `auto_close_grace_cycles` consecutive cycles
# it is marked closed and a close notification is sent to the platform.
auto_close_enabled: true
auto_close_grace_cycles: 2

# ---------------------------------------------------------------------------
# Webhooks
# ---------------------------------------------------------------------------
# Fire HTTP POSTs when findings at or above `severity_threshold` are detected.
# Payloads are HMAC-SHA256 signed when a secret is provided (X-LK-Signature header).
# webhooks:
#   - url: https://hooks.example.com/security
#     severity_threshold: high    # critical | high | medium | low | info
#     secret: ${LK_WEBHOOK_SECRET}
#   - url: https://slack-webhook.example.com/alerts
#     severity_threshold: critical
